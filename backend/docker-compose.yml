version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: programai_postgres
    environment:
      POSTGRES_DB: programai
      POSTGRES_USER: programai
      POSTGRES_PASSWORD: programai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: programai_redis
    ports:
      - "6379:6379"
volumes:
  pgdata:
